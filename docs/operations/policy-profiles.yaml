## Validation Checks

每个 profile 必须通过以下验证检查：

### strict.profile 检查清单

```
[ ] verify --ci 返回 exit_code = 0
[ ] 所有 12 个 checks 状态为 PASS
[ ] hard_gate_failures = 0
[ ] soft_gate_failures = 0
[ ] overall_score >= 0.85
[ ] structural_score >= 0.90
[ ] quality_score >= 0.80
[ ] compare 结果已保存
[ ] 证据包已归档
```

### transitional.profile 检查清单

```
[ ] verify --ci 返回 exit_code <= 1
[ ] hard_gate_failures = 0
[ ] soft_gate_failures <= 3
[ ] overall_score >= 0.70
[ ] legacy_compatibility = true (如适用)
[ ] compare 结果已保存
[ ] 证据包已归档
```

### pilot.profile 检查清单

```
[ ] verify --ci 返回 exit_code <= 2
[ ] hard_gate_failures <= 1
[ ] soft_gate_failures <= 5
[ ] overall_score >= 0.60
[ ] 试点仓库列表已确认
[ ] 试点周期已设定
[ ] 证据包已归档
[ ] pilot report 已生成
```

---

## Evidence Bundle Format

证据包必须包含以下文件：

```
.repo-agent-eval/{profile}-{date}/
├── verify-result.json          # verify 命令输出
├── compare-result.json         # compare 命令输出
├── profile-config.yaml         # 使用的 profile 配置
├── decision.yaml               # 发布/拒绝决策
└── logs/
    ├── verify.log
    └── compare.log
```

### decision.yaml 格式

```yaml
---
date: "2026-04-25T14:30:00Z"
profile: strict
overall_score: 0.87
structural_score: 0.92
quality_score: 0.85
hard_gate_failures: []
soft_gate_failures: []
decision: GO
authority: Agent_QualityRelease
evidence_bundle: .repo-agent-eval/strict-2026-04-25/
---
```