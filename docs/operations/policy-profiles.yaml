# Policy Profiles Configuration

**文档属性**: CI 配置文件
**版本**: 1.0
**日期**: 2026-04-25

## Profiles Overview

| Profile | 用途 | HARD Gate | SOFT Gate | 整体评分要求 |
|---------|------|-----------|-----------|--------------|
| `strict` | 生产发布 | 0 | 0 | >= 85% |
| `transitional` | 兼容性过渡 | 0 | <= 3 | >= 70% |
| `pilot` | 试点验证 | <= 1 | <= 5 | >= 60% |

---

## strict.profile

```yaml
# 生产环境使用的严格门禁
# 使用场景: 正式发布、main 分支合并、里程碑版本

profile: strict
description: Production release gate with zero tolerance for quality issues
version: "1.0"

# 门禁判定标准
criteria:
  hard_gate_failures: 0          # 必须无 HARD gate 失败
  soft_gate_failures: 0          # 必须无 SOFT gate 失败
  overall_score: >= 0.85         # 整体评分 >= 85%
  structural_score: >= 0.90      # 结构评分 >= 90%
  quality_score: >= 0.80         # 质量评分 >= 80%

# 验证命令
verify_command: "repo-wiki verify --ci"
compare_command: "repo-wiki compare --baseline qoder-style/ --target docs/"

# 操作策略
actions:
  on_hard_gate_fail:
    behavior: BLOCK_AND_ROLLBACK
    message: "HARD gate failure detected. Blocking release and initiating rollback."
    requires_approval: true
    approval_authority: ManagerAgent

  on_soft_gate_fail:
    behavior: BLOCK_WITH_REVIEW
    message: "SOFT gate failure detected. Blocking release pending review."
    requires_approval: true
    approval_authority: Agent_QualityRelease

  on_score_below_threshold:
    behavior: BLOCK_WITH_REVIEW
    message: "Overall score below threshold. Manual review required."

# 退出码策略
exit_code_policy:
  0: ALL_PASS - all gates cleared, release approved
  1: HARD_GATE_FAIL - hard gate failures detected, release blocked
  2: SOFT_GATE_FAIL - soft gate failures detected, release blocked pending review

# 证据收集
evidence:
  verify_output: "verify-result.json"
  compare_output: "compare-result.json"
  evidence_bundle: ".repo-agent-eval/{date}/strict/"
```

