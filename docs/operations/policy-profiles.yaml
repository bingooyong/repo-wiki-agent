## Profile Selection Guide

### 如何选择 Profile

| 场景 | 推荐 Profile |
|------|-------------|
| 正式生产发布 | strict |
| main/master 分支合并 | strict |
| 里程碑版本发布 | strict |
| 从旧格式迁移期间 | transitional |
| Qxx/Sxx 兼容模式运行中 | transitional |
| 新功能试点验证 | pilot |
| 跨仓库概念验证 | pilot |
| 开发分支测试 | pilot |

### Profile 切换流程

1. **试点阶段** (pilot)
   - 验证新功能可行性
   - 收集反馈和数据
   - 调整 profile 配置

2. **过渡阶段** (transitional)
   - 应用到所有仓库
   - 监控关键指标
   - 准备完全切换

3. **生产阶段** (strict)
   - 完全切换到严格标准
   - 持续监控质量
   - 不断优化基线

