## transitional.profile

```yaml
# 兼容性过渡期使用的宽松门禁
# 使用场景: 从旧格式迁移到新格式、Qxx/Sxx 兼容模式

profile: transitional
description: Compatibility transitional gate allowing legacy formats with review
version: "1.0"

# 门禁判定标准
criteria:
  hard_gate_failures: 0
  soft_gate_failures: <= 3
  overall_score: >= 0.70
  structural_score: >= 0.75
  quality_score: >= 0.65
  acceptance_blocked: false
  legacy_compatibility: true   # 启用 Qxx/Sxx 兼容性模式

# 验证命令
verify_command: "repo-wiki verify --ci --legacy-compat"
compare_command: "repo-wiki compare --baseline qoder-style/ --target docs/ --allow-legacy"

# 操作策略
actions:
  on_hard_gate_fail:
    behavior: BLOCK_AND_ROLLBACK
    message: "HARD gate failure in transitional mode. Blocking release."
    requires_approval: true
    approval_authority: ManagerAgent

  on_soft_gate_fail:
    behavior: ALLOW_WITH_LOG
    message: "SOFT gate failures within tolerance. Logging and allowing."
    requires_approval: false
    log_level: WARN

  on_legacy_compat_triggered:
    behavior: ALLOW_WITH_NOTE
    message: "Legacy Qxx/Sxx compatibility mode activated."
    requires_approval: false

# 退出码策略
exit_code_policy:
  0: ALL_PASS - all gates cleared, release approved
  1: HARD_GATE_FAIL - hard gate failures, release blocked
  2: SOFT_GATE_FAIL - soft gate failures within tolerance, log and continue

# 证据收集
evidence:
  verify_output: "verify-result.json"
  compare_output: "compare-result.json"
  legacy_profile: ".repo-agent-eval/legacy-compat-{date}.json"
```

