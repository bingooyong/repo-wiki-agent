## pilot.profile

```yaml
# 试点验证阶段使用的探索性门禁
# 使用场景: 新功能验证、跨仓库试点、概念验证

profile: pilot
description: Exploratory gate for pilot testing with relaxed constraints
version: "1.0"

# 门禁判定标准
criteria:
  hard_gate_failures: <= 1      # 允许最多 1 个 HARD gate 失败
  soft_gate_failures: <= 5      # 允许最多 5 个 SOFT gate 失败
  overall_score: >= 0.60        # 整体评分 >= 60%
  structural_score: >= 0.65
  quality_score: >= 0.55
  pilot_repos:
    - repo-agent
    - AI_API_Atlas
  test_duration_days: 14        # 试点周期

# 验证命令
verify_command: "repo-wiki verify --ci --pilot-mode"
compare_command: "repo-wiki compare --baseline qoder-style/ --target docs/ --pilot"

# 操作策略
actions:
  on_hard_gate_fail:
    behavior: LOG_AND_CONTINUE
    message: "HARD gate failure in pilot mode. Logging and continuing."
    requires_approval: false
    log_level: ERROR

  on_soft_gate_fail:
    behavior: LOG_AND_CONTINUE
    message: "SOFT gate failures detected. Logging and continuing."
    requires_approval: false
    log_level: WARN

  on_pilot_complete:
    behavior: GENERATE_REPORT
    message: "Pilot phase complete. Generating pilot report."
    output: ".repo-agent-eval/pilot-report-{date}.json"

# 退出码策略
exit_code_policy:
  0: ALL_PASS - pilot gates cleared
  1: HARD_GATE_FAIL - hard gate failures logged, pilot continues
  2: SOFT_GATE_FAIL - soft gate failures logged, pilot continues

# 证据收集
evidence:
  verify_output: "verify-result.json"
  compare_output: "compare-result.json"
  pilot_metrics: ".repo-agent-eval/pilot-metrics.json"
  pilot_evidence: ".repo-agent-eval/pilot-{date}/"
```

