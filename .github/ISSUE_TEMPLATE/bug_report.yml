name: Bug Report
description: Report something that is not working as expected
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      placeholder: Describe the bug in detail. What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error

    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: repo-wiki Version
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      placeholder: Paste any relevant log output here

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the existing issues
          required: true
        - label: I have verified the bug exists in the latest version
          required: true