name: repo-wiki-transitional

on:
  push:
    branches: [develop, release/*]
  pull_request:

env:
  PROFILE: transitional
  EVIDENCE_DIR: .repo-agent-eval/transitional-${{ github.run_id }}

jobs:
  verify-and-compare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic PyYAML rich typer pathspec pytest bc

      - name: Generate artifacts
        run: python -m repo_wiki.main init

      - name: Run verify (transitional mode)
        id: verify
        run: |
          python -m repo_wiki.main verify --ci --profile transitional > verify-result.json || true
          cat verify-result.json

      - name: Run baseline compare (allow legacy)
        id: compare
        run: |
          python -m scripts.qoder_baseline_comparison \
            --target docs/ \
            --baseline qoder-style/ \
            --output compare-result.json || true

      - name: Check legacy compatibility
        id: legacy-check
        run: |
          if grep -q 'legacy_qs_compatibility' verify-result.json 2>/dev/null; then
            echo "legacy_compat=true" >> $GITHUB_OUTPUT
            echo "Legacy Qxx/Sxx compatibility mode activated"
          fi

      - name: Collect evidence
        run: |
          mkdir -p ${{ env.EVIDENCE_DIR }}
          cp verify-result.json ${{ env.EVIDENCE_DIR }}/ 2>/dev/null || echo "{}" > ${{ env.EVIDENCE_DIR }}/verify-result.json
          cp compare-result.json ${{ env.EVIDENCE_DIR }}/ 2>/dev/null || echo "{}" > ${{ env.EVIDENCE_DIR }}/compare-result.json

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidence-bundle-transitional-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}

      - name: Decision gate
        run: |
          bash ci/scripts/decision.sh --profile transitional \
            --verify verify-result.json \
            --compare compare-result.json \
            --evidence ${{ env.EVIDENCE_DIR }}