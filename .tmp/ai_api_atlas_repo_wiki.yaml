project:
  root: "/Users/bingooyong/Code/01Code/github.com/bingooyong/AI_API_Atlas"

scan:
  include_hidden: false
  follow_symlinks: false
  max_file_count: 50000

index:
  enabled: true
  vector_backend: "chromadb"
  embedding_model: "local"
  chunk_strategy: "auto"

llm:
  provider: "minimaxi"
  model_init: "minimaxi/MiniMax-M2.7"
  model_update: "minimaxi/MiniMax-M2.7"
  model_verify: "minimaxi/MiniMax-M2.7"
  max_concurrent: 3
  cache: true

output:
  docs_dir: "docs/"
  ai_dir: "ai/source-of-truth/"
  index_dir: ".repo-wiki/"
  claude_dir: ".claude/"

security:
  redact_secrets: true
  skip_binary_files: true
  max_file_size_kb: 1024
